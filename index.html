<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyline Premium Ceilings</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; overflow-x: hidden; }
        .hero { position: relative; height: 100vh; background: linear-gradient(to bottom, #f8f8f8, #f1f1f1); animation: fadeIn 2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); padding: 20px; }
        .service-card { transition: transform 0.3s; background: linear-gradient(45deg, #ff6b6b, #f06595); padding: 20px; margin: 10px; }
        .service-card:hover { transform: scale(1.05); }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); } 
        .gallery img { width: 100%; transition: transform 0.3s; }
        .gallery img:hover { transform: scale(1.1); }
        /* Other styles here for elements like input, navigation */
    </style>
</head>
<body>
    <div class="hero">
        <h1>Welcome to Skyline Premium Ceilings</h1>
    </div>
    <div class="stats">
        <div>Statistic 1</div>
        <div>Statistic 2</div>
        <div>Statistic 3</div>
    </div>
    <div class="services">
        <div class="service-card">Service 1</div>
        <div class="service-card">Service 2</div>
        <div class="service-card">Service 3</div>
    </div>
    <div class="gallery">
        <img src="https://source.unsplash.com/random/300x300?sig=1" alt="Image 1">
        <img src="https://source.unsplash.com/random/300x300?sig=2" alt="Image 2">
        <img src="https://source.unsplash.com/random/300x300?sig=3" alt="Image 3">
    </div>
    <form>
        <input type="text" placeholder="Your Name" />
        <input type="email" placeholder="Your Email" />
        <button type="submit">Submit</button>
    </form>
    <script>
        // Interactive 3D interactions and smooth scrolling here
    </script>
</body>
</html>
